<svg width="100%" viewBox="0 0 680 280" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>spendCal logo</title>
  <desc>spendCal — final logo, Sora typeface, terracotta</desc>
  <defs>
    <style>@import url('https://fonts.googleapis.com/css2?family=Sora:wght@400;700');</style>
    <clipPath id="fclip">
      <rect x="60" y="40" width="180" height="180" rx="44"/>
    </clipPath>
    <mask id="text-gaps" maskUnits="userSpaceOnUse">
      <rect x="0" y="0" width="680" height="280" fill="white"/>
      <rect x="177.04" y="146" width="85.92" height="28.67" fill="black" rx="2"/>
      <rect x="101.45" y="156.67" width="237.09" height="105.33" fill="black" rx="2"/>
    </mask>
  </defs>

  <rect x="60" y="40" width="180" height="180" rx="44" fill="#0F0702"/>
  <rect x="86" y="158" width="32" height="62" rx="16" fill="#B03E1E"/>
  <rect x="134" y="124" width="32" height="96" rx="16" fill="#D4750C"/>
  <rect x="182" y="94" width="32" height="126" rx="16" fill="#E8A020"/>
  <line x1="212" y1="98" x2="90" y2="216" stroke="#F2C060" stroke-width="11" stroke-linecap="round" clip-path="url(#fclip)" mask="url(#text-gaps)"/>

  <text x="274" y="155" font-family="'Sora', sans-serif" font-size="62" letter-spacing="-1">
    <tspan font-weight="400" fill="#B85C38">spend</tspan><tspan font-weight="700" fill="#0F0702">Cal</tspan>
  </text>
</svg>
